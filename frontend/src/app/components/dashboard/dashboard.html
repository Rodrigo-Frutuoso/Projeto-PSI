<div class="dashboard-page">
  <div class="dashboard-card">
    <div class="badge">Dashboard</div>
    <h1>Bem-vindo, {{ username }}!</h1>
    <p>
      Sessão iniciada com sucesso. Aqui vais poder aceder às funcionalidades da aplicação.
    </p>

    <div class="actions">
      <a routerLink="/profile" class="btn-primary">O meu perfil</a>
      <a routerLink="/register" class="btn-secondary">Criar outra conta</a>
      <button type="button" class="btn-secondary" (click)="logout()">Terminar sessão</button>
      <a routerLink="/search" class="btn-primary">Pesquisar artistas</a>
    </div>
  </div>
</div>
