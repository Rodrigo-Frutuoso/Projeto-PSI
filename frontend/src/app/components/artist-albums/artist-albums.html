<div class="albums-page">
  <div class="albums-container">
    <div class="albums-header">
      <a [routerLink]="['/artist', artistId]" class="btn-back">← Voltar ao artista</a>
    </div>

    <div class="albums-card">
      <div class="albums-badge">Discografia</div>
      <h1>Discografia completa</h1>
      <p class="albums-subtitle">Todos os lançamentos conhecidos deste artista.</p>

      <hr class="albums-divider">

      <div *ngIf="isLoading" class="loading-state">
        <div class="loader-ring"></div>
        <p>A carregar álbuns...</p>
      </div>

      <div *ngIf="!isLoading && loadError" class="alert alert-error">
        <span class="alert-icon">✕</span>
        <div>
          <strong>Erro</strong>
          <p>{{ loadError }}</p>
        </div>
      </div>

      <div *ngIf="!isLoading && !loadError && albums.length > 0" class="albums-list">
        <div class="album-item" *ngFor="let album of albums; let i = index">
          <div class="album-main">
            <span class="album-position">{{ i + 1 }}.</span>
            <span class="album-title">{{ album.title }}</span>
          </div>
          <span class="album-year">{{ album.releaseYear }}</span>
        </div>
      </div>

      <div *ngIf="!isLoading && !loadError && albums.length === 0" class="empty-state">
        Este artista ainda não tem álbuns registados.
      </div>
    </div>
  </div>
</div>
