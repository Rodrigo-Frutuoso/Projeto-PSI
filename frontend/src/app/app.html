<header class="global-navbar" [class.auth-page]="isAuthPage">
  <!-- Left Side: Logo -->
  <a [routerLink]="isAuthenticated ? '/dashboard' : '/login'" (click)="clearSearchState()" class="nav-left nav-logo" style="cursor: pointer;">
    <span class="animated-music-icon">♫</span>
    @if (showBrandTitle) {
    <span class="nav-title">Music Collection</span>
    }
  </a>

  <!-- Show middle & right sections ONLY if authenticated -->
  @if (isAuthenticated) {
    <!-- Center: Search Bar -->
    <div class="nav-center">
      <form class="nav-search-form" (ngSubmit)="onSearch()">
        <div class="search-input-group">
          <!-- Type selector (Custom Dropdown) -->
          <div class="custom-type-select-container">
            <button type="button" class="nav-type-select" (click)="toggleTypeDropdown()">
              {{ navSearchType === 'albums' ? 'Álbuns' : 'Artistas' }}
            </button>
            @if (isTypeDropdownOpen) {
              <div class="custom-type-dropdown">
                <button type="button" class="custom-type-option" [class.active]="navSearchType === 'artists'" (click)="selectType('artists')">Artistas</button>
                <button type="button" class="custom-type-option" [class.active]="navSearchType === 'albums'" (click)="selectType('albums')">Álbuns</button>
              </div>
            }
          </div>

          <input 
            #searchInput
            type="text" 
            name="searchQuery"
            [(ngModel)]="searchQuery" 
            (ngModelChange)="onSearchChange($event)"
            autocomplete="off"
            [placeholder]="navSearchType === 'albums' ? 'Pesquisar álbuns...' : 'Pesquisar artistas...'" 
            class="nav-search-input"
          >
          <button type="submit" class="nav-search-button" [attr.aria-label]="'Pesquisar ' + (navSearchType === 'albums' ? 'álbuns' : 'artistas')">
            <img src="icons/search.svg" alt="" class="search-button-icon" aria-hidden="true">
          </button>
        </div>


      </form>
    </div>

    <!-- Right Side: Profile & Dropdown -->
    <div class="nav-right">
      <div class="profile-menu">
        <button #profileButton type="button" class="profile-btn" (click)="toggleDropdown()">
          <div class="nav-avatar">{{ initial }}</div>
        </button>

        @if (isDropdownOpen) {
          <div class="profile-dropdown">
            <div class="dropdown-header">
              <strong>{{ username }}</strong>
            </div>
            <a routerLink="/profile" class="dropdown-item">O meu perfil</a>
            <hr class="dropdown-divider">
            <button type="button" class="dropdown-item item-danger" (click)="logout()">Terminar sessão</button>
          </div>
        }
      </div>
    </div>
  } @else {
    <!-- Center: Welcome Text -->
    <div class="nav-center nav-center-guest">
      <span class="nav-welcome">Bem-vindo!</span>
    </div>

    <!-- Right Side: Auth Buttons -->
    <div class="nav-right nav-auth-buttons">
      <a routerLink="/register" class="nav-btn-signup">Sign Up</a>
      <a routerLink="/login" class="nav-btn-login">Login</a>
    </div>
  }
</header>
<div class="app-layout" [class.authenticated]="isAuthenticated && !isAuthPage" [class.sidebar-collapsed]="!isSidebarExpanded">
  @if (isAuthenticated && !isAuthPage) {
    <aside class="app-sidebar" [class.collapsed]="!isSidebarExpanded">

      <div class="sidebar-collection-container">
        <div class="sidebar-header">
          <button type="button" class="header-left toggle-btn" (click)="toggleSidebar()" aria-label="Recolher A minha biblioteca">
            <svg role="img" height="24" width="24" aria-hidden="true" viewBox="0 0 24 24" fill="currentColor" class="header-icon" style="color: #b3b3b3; transition: color 0.2s;">
              <path d="M14.5 2.134a1 1 0 0 1 1 0l6 3.464a1 1 0 0 1 .5.866V21a1 1 0 0 1-1 1h-6a1 1 0 0 1-1-1V3a1 1 0 0 1 .5-.866zM16 4.732V20h4V7.041l-4-2.309zM3 22a1 1 0 0 1-1-1V3a1 1 0 0 1 2 0v18a1 1 0 0 1-1 1zm6 0a1 1 0 0 1-1-1V3a1 1 0 0 1 2 0v18a1 1 0 0 1-1 1z"></path>
            </svg>
            <span class="sidebar-text">A minha biblioteca</span>
          </button>
        </div>
        
        <nav class="sidebar-nav secondary-nav">
          <a routerLink="/collection" class="sidebar-link" routerLinkActive="active" [title]="!isSidebarExpanded ? 'Coleção' : ''">
            <span class="material-symbols-outlined sidebar-material-icon" aria-hidden="true">library_music</span>
            <span class="sidebar-text">Coleção</span>
          </a>
          <a routerLink="/requests" class="sidebar-link" routerLinkActive="active" [title]="!isSidebarExpanded ? 'Pedidos' : ''">
            <span class="emoji-icon">🧾</span>
            <span class="sidebar-text">Pedidos</span>
          </a>
        </nav>
      </div>
    </aside>
  }

  <main class="app-main-view">
    <router-outlet />
  </main>
</div>
